<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code 工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1a1a26;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --accent-mid: #00e5a060;
    --text: #e8e8f0;
    --text-dim: #6a6a80;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.15;
    z-index: 0;
    animation: gridShift 20s linear infinite;
  }

  @keyframes gridShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #6c5ce7; bottom: -100px; left: -100px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
    padding: 32px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease-out;
  }

  .header .logo-icon {
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 14px;
    display: inline-grid;
    place-items: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 7px;
    border: 3px solid var(--bg);
    border-radius: 5px;
  }

  .logo-icon .dot {
    width: 10px; height: 10px;
    background: var(--bg);
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 300;
    margin-top: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tool Cards */
  .tools {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tool-card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation: fadeUp 0.6s ease-out both;
    position: relative;
    overflow: hidden;
  }

  .tool-card:nth-child(1) { animation-delay: 0.1s; }
  .tool-card:nth-child(2) { animation-delay: 0.2s; }

  .tool-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-dim) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .tool-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0, 229, 160, 0.08);
  }

  .tool-card:hover::before { opacity: 1; }

  .tool-icon {
    flex-shrink: 0;
    width: 64px; height: 64px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    position: relative;
    z-index: 1;
  }

  .tool-icon svg { width: 32px; height: 32px; }

  .tool-icon.gen {
    background: linear-gradient(135deg, #00e5a0, #00c48f);
  }
  .tool-icon.gen svg { stroke: var(--bg); }

  .tool-icon.compose {
    background: linear-gradient(135deg, #6c5ce7, #a855f7);
  }
  .tool-icon.compose svg { stroke: #fff; }

  .tool-info {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .tool-info h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .tool-info p {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
    line-height: 1.5;
  }

  .tool-arrow {
    flex-shrink: 0;
    width: 20px; height: 20px;
    color: var(--text-dim);
    transition: all 0.3s;
    position: relative;
    z-index: 1;
  }

  .tool-card:hover .tool-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }

  .footer {
    text-align: center;
    margin-top: 48px;
    animation: fadeUp 0.6s ease-out 0.3s both;
  }

  .footer p {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    opacity: 0.6;
  }

  @media (max-width: 480px) {
    .container { padding: 24px 16px; }
    .tool-card { padding: 20px; gap: 14px; }
    .tool-icon { width: 52px; height: 52px; border-radius: 12px; }
    .tool-icon svg { width: 26px; height: 26px; }
    .tool-info h2 { font-size: 16px; }
    .header h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <div class="header">
    <div class="logo-icon"><div class="dot"></div></div>
    <h1>QR Code 工具箱</h1>
    <p>生成 QR Code，或將 QR 合成到你的圖片上</p>
  </div>

  <div class="tools">
    <a href="generator.html" class="tool-card">
      <div class="tool-icon gen">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="3" height="3"/>
          <line x1="20" y1="14" x2="20" y2="20"/>
          <line x1="17" y1="17" x2="20" y2="17"/>
        </svg>
      </div>
      <div class="tool-info">
        <h2>QR 生成器</h2>
        <p>輸入網址即時產生 QR Code，支援自訂顏色、尺寸、中間 Logo，可下載 PNG / SVG</p>
      </div>
      <svg class="tool-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
    </a>

    <a href="compose.html" class="tool-card">
      <div class="tool-icon compose">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="tool-info">
        <h2>QR 圖片合成</h2>
        <p>上傳背景圖與 QR Code 圖片，拖曳擺放位置、調整大小，下載合成圖</p>
      </div>
      <svg class="tool-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
    </a>
  </div>

  <div class="footer">
    <p>QR Code Toolbox</p>
  </div>
</div>

</body>
</html>
